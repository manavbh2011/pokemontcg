<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Trader - Register</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="../index.html">
        <span class="brand-mark"></span>
        <span>Pokemon Trader</span>
      </a>
      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="packs.html">Packs</a>
        <a href="market.html">Market</a>
        <a href="collection.html">Collection</a>
        <a href="showcase.html">Showcase</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </header>

  <main class="page form-wrap">
    <section class="panel form-card">
      <span class="eyebrow">Create your trainer account</span>
      <h1>Register</h1>
      <p class="helper-text">Start opening packs, collecting cards, and trading with other players.</p>
      <form id="register-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required />

        <label for="name">Display Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your display name" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required />

        <button type="submit">Create account</button>
      </form>
      <p class="helper-text">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
