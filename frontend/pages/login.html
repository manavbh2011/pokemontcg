<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Trader - Login</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="../index.html">
        <span class="brand-mark"></span>
        <span>Pokemon Trader</span>
      </a>
      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="packs.html">Packs</a>
        <a href="market.html">Market</a>
        <a href="collection.html">Collection</a>
        <a href="showcase.html">Showcase</a>
        <span id="nav-auth"></span>
      </nav>
    </div>
  </header>

  <main class="page form-wrap">
    <section class="panel form-card">
      <span class="eyebrow">Welcome back, trainer</span>
      <h1>Login</h1>
      <p class="helper-text">Jump back into the market, open new packs, and manage your collection.</p>
      <div id="login-gate-notice" class="form-notice form-notice--gate" hidden role="status"></div>
      <div id="login-error" class="form-notice form-notice--error" hidden role="alert"></div>
      <form id="login-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />

        <button type="submit">Login</button>
      </form>
      <p class="helper-text">Don't have an account? <a href="register.html">Register</a></p>
    </section>
  </main>

  <script src="../js/config.js"></script>
  <script>
    (function () {
      var el = document.getElementById("nav-auth");
      if (!el) return;
      if (localStorage.getItem("username")) {
        el.innerHTML =
          '<a href="user.html">Trainers</a><a href="login.html" data-logout>Logout</a>';
      } else {
        el.innerHTML = '<a class="active" href="login.html">Login</a>';
      }
    })();
  </script>
  <script src="../js/logout.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
