<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Trader - Card Showcase</title>
  <script src="../js/auth-guard.js"></script>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="../index.html">
        <span class="brand-mark"></span>
        <span>Pokemon Trader</span>
      </a>
      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="packs.html">Packs</a>
        <a href="market.html">Market</a>
        <a href="collection.html">Collection</a>
        <a class="active" href="showcase.html">Showcase</a>
        <a href="user.html">Trainers</a>
        <a href="login.html" data-logout>Logout</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="panel section-card">
      <span class="eyebrow">Trainer highlight</span>
      <h1><span id="showcase-username">User</span>'s Card Showcase</h1>
      <p class="muted" id="showcase-description">Featured cards chosen by this trainer.</p>

      <section id="showcase-grid"></section>

      <div class="cta-row">
        <button onclick="openAddToShowcaseModal()">Add Card</button>
      </div>
    </section>

    <dialog id="add-to-showcase-modal">
      <div class="dialog-body">
        <h2>Pick a card from your collection</h2>
        <div id="showcase-card-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;max-height:60vh;overflow-y:auto;"></div>
        <div class="dialog-actions">
          <button type="button" class="button-secondary" onclick="$(&#39;add-to-showcase-modal&#39;).close()">Cancel</button>
        </div>
      </div>
    </dialog>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tcgdex/sdk@2/dist/tcgdex.browser.global.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/logout.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
