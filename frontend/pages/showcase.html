<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Trader - Card Showcase</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="../index.html">
        <span class="brand-mark"></span>
        <span>Pokemon Trader</span>
      </a>
      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="market.html">Market</a>
        <a href="packs.html">Packs</a>
        <a class="active" href="showcase.html">Showcase</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="panel section-card">
      <span class="eyebrow">Trainer highlight</span>
      <h1><span id="showcase-username">User</span>'s Card Showcase</h1>
      <p class="muted" id="showcase-description">Featured cards chosen by this trainer.</p>

      <section id="showcase-grid">
        <article class="card-shell">
          <div class="card-image">Showcase cards will appear here</div>
          <div>
            <h3>Favorite Pull</h3>
            <div class="card-meta"><span class="tag">Showcase</span><span>Trainer pick</span></div>
          </div>
        </article>
      </section>
    </section>
  </main>

  <script src="../js/main.js"></script>
</body>

</html>
