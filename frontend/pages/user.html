<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="../favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Trader - Trainers</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="../index.html">
        <span class="brand-mark"></span>
        <span>Pokemon Trader</span>
      </a>
      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="packs.html">Packs</a>
        <a href="market.html">Market</a>
        <a href="collection.html">Collection</a>
        <a href="showcase.html">Showcase</a>
        <a class="active" href="user.html">Trainers</a>
        <a href="admin.html" class="admin-nav-link" style="display:none">Admin</a>
        <a href="login.html" data-logout>Logout</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="panel section-card">
      <span class="eyebrow">Find a trainer</span>
      <h1>Trainer Search</h1>
      <p class="muted">Search by username or display name to view their showcase.</p>

      <div style="position:relative;max-width:480px;margin-top:1.5rem;">
        <input type="text" id="trainer-search" placeholder="Search trainers..." autocomplete="off" />
        <ul id="trainer-suggestions" style="display:none;position:absolute;z-index:100;width:100%;background:#121933;border:1px solid rgba(255,255,255,0.12);border-radius:12px;margin:4px 0 0;padding:0;list-style:none;max-height:260px;overflow-y:auto;"></ul>
      </div>
    </section>

    <section class="panel section-card" id="trainer-profile" style="display:none;margin-top:1.5rem;">
      <span class="eyebrow">Trainer profile</span>
      <h2 id="tp-name"></h2>
      <p class="muted">@<span id="tp-username"></span></p>
      <h3 style="margin-top:1.5rem;">Showcase</h3>
      <div id="tp-showcase-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;margin-top:1rem;"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tcgdex/sdk@2/dist/tcgdex.browser.global.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
