<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Trader - Card Market</title>
  <script src="../js/auth-guard.js"></script>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="../index.html">
        <span class="brand-mark"></span>
        <span>Pokemon Trader</span>
      </a>
      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="packs.html">Packs</a>
        <a class="active" href="market.html">Market</a>
        <a href="collection.html">Collection</a>
        <a href="showcase.html">Showcase</a>
        <a href="user.html">Trainers</a>
        <a href="login.html" data-logout>Logout</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="panel section-card">
      <div class="balance-bar">
        <div>
          <span class="eyebrow">Trading floor</span>
          <h1>Card Market</h1>
          <p class="muted">Browse listings, filter by rarity, and post cards for sale.</p>
        </div>
        <div class="balance-pill">Coins: <span id="user-balance">0</span></div>
      </div>

      <div
        id="market-notice"
        class="market-notice-banner form-notice form-notice--error"
        role="alert"
        aria-live="assertive"
        hidden
      ></div>

      <div id="filters" class="controls">
        <input type="text" id="search" placeholder="Search cards..." />
        <select id="filter-type">
          <option value="">All Types</option>
        </select>
        <select id="filter-rarity">
          <option value="">All Rarities</option>
        </select>
        <select id="sort-by">
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
        </select>
      </div>

      <section id="listings-grid">
        <article class="card-shell">
          <div class="card-image">Market listings will appear here</div>
          <div>
            <h3>Featured Listing</h3>
            <div class="card-meta"><span class="tag">Preview</span><span>0 coins</span></div>
          </div>
        </article>
      </section>

      <div class="cta-row">
        <button id="open-sell-modal">Sell a Card</button>
      </div>
    </section>

    <dialog id="sell-modal">
      <div class="dialog-body">
        <h2>List a Card for Sale</h2>
        <form id="sell-form">
          <div id="sell-error" class="form-notice form-notice--error" role="alert" hidden></div>
          <label for="sell-card">Select Card</label>
          <select id="sell-card" name="card_id" required></select>

          <label for="sell-price">Price (coins)</label>
          <input type="number" id="sell-price" name="price" min="1" step="1" required />

          <div class="dialog-actions">
            <button type="submit">List Card</button>
            <button type="button" class="button-secondary" id="close-sell-modal">Cancel</button>
          </div>
        </form>
      </div>
    </dialog>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tcgdex/sdk@2/dist/tcgdex.browser.global.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/logout.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
