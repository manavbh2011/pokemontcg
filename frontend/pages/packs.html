<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Trader - Buy Packs</title>
  <script src="../js/auth-guard.js"></script>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="../index.html">
        <span class="brand-mark"></span>
        <span>Pokemon Trader</span>
      </a>
      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a class="active" href="packs.html">Packs</a>
        <a href="market.html">Market</a>
        <a href="collection.html">Collection</a>
        <a href="showcase.html">Showcase</a>
        <a href="user.html">Trainers</a>
        <a href="login.html" data-logout>Logout</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="panel section-card">
      <div class="balance-bar">
        <div>
          <span class="eyebrow">Rip into a new pack</span>
          <h1>Buy Packs</h1>
          <p class="muted">What are you waiting for? Open a pack now!</p>
        </div>
        <div class="balance-pill">Coins: <span id="user-balance">0</span></div>
      </div>

      <section id="packs-grid">
        <article class="card-shell">
          <div class="card-image">Available packs will appear here</div>
          <div>
            <h3>Starter Pack</h3>
            <div class="card-meta"><span class="tag">Preview</span><span>See price in app</span></div>
          </div>
        </article>
      </section>
    </section>

    <dialog id="pack-open-modal">
      <div class="dialog-body">
        <h2>You got these cards!</h2>
        <div id="pack-results">
          <article class="card-shell">
            <div class="card-image">Pack results appear here</div>
            <div class="card-meta"><span class="tag">Reveal</span><span>Nice pull</span></div>
          </article>
        </div>
        <div class="dialog-actions">
          <button id="close-modal">Close</button>
        </div>
      </div>
    </dialog>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tcgdex/sdk@2/dist/tcgdex.browser.global.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/logout.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
